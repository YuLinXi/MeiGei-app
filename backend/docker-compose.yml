services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: meigei
      POSTGRES_USER: meigei
      POSTGRES_PASSWORD: meigei
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meigei -d meigei"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/meigei
      DB_USER: meigei
      DB_PASSWORD: meigei
      PORT: 8080
    ports:
      - "8080:8080"

volumes:
  pgdata:
