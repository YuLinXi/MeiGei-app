services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: dontlift
      POSTGRES_USER: dontlift
      POSTGRES_PASSWORD: dontlift
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dontlift -d dontlift"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/dontlift
      DB_USER: dontlift
      DB_PASSWORD: dontlift
      PORT: 8080
    ports:
      - "8080:8080"

volumes:
  pgdata:
